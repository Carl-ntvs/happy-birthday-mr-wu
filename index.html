    <template v-if="!end">
        <main>
            <p class="main-title">倒數</p>
            <div class="grid">
                <div class="date">
                    <strong>{{day}}</strong>
                    <p class="date-text">天</p>
                </div>
                <div class="date">
                    <strong>{{hour}}</strong>
                    <p class="date-text">小時</p>
                </div>
                <div class="date">
                    <strong>{{min}}</strong>
                    <p class="date-text">分鐘</p>
                </div>
                <div class="date">
                    <strong>{{sec}}</strong>
                    <p class="date-text">秒</p>
                </div>
            </div>
            <p class="date-text">6/14</p>
        </main>
    </template>
    <template v-else>
        <main v-show="page===0">
            <p class="main-title">點擊左右遊玩</p>
            <button v-if="map.size===5" @click="play">兄弟聽首歌吧</button>
            <div class="type-input" v-show="onPlay">
                <div class="ctrl">
                    <label style="font-size: 24px;color: white">
                        音量
                    </label>
                        <input type="range" v-model="volume" id="" min="0" max="1" step="0.01" style="width: 200px;transform: scale(1.5)">
                </div>
            </div>
        </main>
        <section v-show="page===1">
            <canvas id="cv"></canvas>
            <button id="replay">↺ Replay Rain</button>
        </section>

        <section v-show="page===2" id="fluid">
            <div id="cursor"></div>
            <div id="grain"></div>
            <div id="type-input">
                <div class="ctrl"><label>DENSITY</label><input type="range" id="sl-d" min="2" max="18" value="9"
                                                               step="0.1"></div>
                <div class="ctrl"><label>SPEED</label> <input type="range" id="sl-s" min="0" max="100" value="28"></div>
                <div class="ctrl"><label>TURB</label> <input type="range" id="sl-t" min="0" max="100" value="45"></div>
                <div class="ctrl"><label>FONT SIZE</label><input type="range" id="sl-f" min="10" max="100" value="100">
                </div>
                <input id="text-field" type="text" value="FLUID" placeholder="TYPE…" spellcheck="false"
                       autocomplete="off">
                <button class="btn" id="btn-p">⏸</button>
            </div>
        </section>
        <section v-show="page===3">
            <canvas id="wave"></canvas>
        </section>
        <section v-show="page===4">
            <iframe src="test.html" frameborder="0" style="min-height: 100vh;width: 100%;"></iframe>
        </section>
        <button class="nav-btn left" @click="scrollLeft()">◀</button>
        <button class="nav-btn right" @click="scrollRight()">▶</button>
    </template>
    <div class="color-picker-wrapper" v-show="page===0">
        <label for="eyeColor">調整眼睛描邊顏色：</label>
        <input type="color" id="eyeColor" v-model="eyeColor">

<script type="module" src="fluid.js"></script>
<script src="wave.js"></script>
<script src="pixel.js"></script>
<script src="./vue.3.5.13.js"></script>
<script>
    const {createApp, ref, onMounted, computed, watch, nextTick,} = Vue;
    createApp({
        setup() {
            const volume = ref(0.15);
            const onPlay=ref(false);
            const video = document.getElementById('video');
            const date = ref(new Date());
            const day = ref();
            const hour = ref();
            const min = ref();
            const sec = ref();
            const read = ref(false);
            const end = ref(false);
            const map = ref(new Set([0]));
            const eyeColor = ref('#ff0032');
            const bsd = new Date(2026, 5, 14)
            // const bsd = new Date(Date.now() + 5000)
            const page = ref(0)
            watch(volume, (val) => {
                video.volume = val
            })
            watch(page, (val) => {
                if (typeof map.value[val] == 'undefined') {
                    map.value.add(val)
                    console.log(map.value.size)
                }
                switch (val) {
                    case 1:
                        initPixelRain()
                        break;
                    case 2:
                        initFluid()
                        break
                    case 3:
                        intoWave()
                        break
                }
            })
            const updateTimer = () => {
                date.value = new Date();
                const diff = bsd - date.value;
                day.value = Math.floor(diff / (1000 * 60 * 60 * 24));
                hour.value = Math.floor(diff % (1000 * 60 * 60 * 24) / (1000 * 60 * 60));
                min.value = Math.floor(diff % (1000 * 60 * 60) / (1000 * 60));
                sec.value = Math.floor(diff % (1000 * 60) / (1000));
                if (diff <= 0) {
                    day.value = 0;
                    hour.value = 0;
                    min.value = 0;
                    sec.value = 0;
                    end.value = true;
                    return;
                }
            }
            const start = () => {
                const synth = window.speechSynthesis;
                const text = new SpeechSynthesisUtterance("Welcome")
                const voices = synth.getVoices();
                text.voice = voices.find(v => v.name.includes('Google') && v.lang.includes('en')) || voices[0];
                text.rate = 0.8;
                text.pitch = 0.1;
                text.volume = 1
                synth.speak(text)
                read.value = true;
            }
            const play = () => {
                if (video.paused) {
                    video.play()
                    onPlay.value=true
                } else {
                    onPlay.value=false
                    video.pause()
                }
            }
            const scrollLeft = () => {
                page.value = (page.value - 1 + 5) % 5
            };
            const scrollRight = () => {
                page.value = (page.value + 1) % 5
            };
            onMounted(() => {
                updateTimer()
                video.volume = volume.value
            })
            setInterval(() => {
                updateTimer()
            }, 1000)
            return {
                day,
                hour,
                min,
                sec,
                start,
                read,
                end,
                eyeColor,
                scrollLeft,
                scrollRight,
                page,
                map,
                volume,
                video,
                play,
                onPlay,
                bsd
            }
        }
    }).mount('#app');
</script>
